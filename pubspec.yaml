name: inner_breeze
description: A meditation and breathing guide app

publish_to: 'none'

version: 1.5.1+41

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter_localizations: 
    sdk: flutter
  localization: ^2.1.1
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.7
  english_words: ^4.0.0
  shared_preferences: ^2.2.0
  table_calendar: ^3.0.9
  provider: ^6.0.0
  go_router: ^14.2.7
  uuid: ^4.2.2
  intl: ^0.20.2
  url_launcher: ^6.0.0
  audioplayers: ^5.2.1
  path_provider: ^2.0.15
  permission_handler: ^12.0.0
  http: ^1.1.2
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

dependency_overrides:
  package_info_plus: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/i18n/
    - assets/
    - assets/sounds/
    - assets/images/
    - assets/icons/
